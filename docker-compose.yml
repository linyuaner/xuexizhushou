# =============================================================
# docker-compose.yml - 学习助手一键部署
# =============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # 利用 BuildKit 缓存加速重复构建
      cache_from:
        - jqlshr/study-helper:latest
    image: jqlshr/study-helper:latest
    container_name: study-helper-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # JWT 密钥：系统会自动生成安全的随机密钥
    volumes:
      # 数据持久化：SQLite 数据库文件
      - quiz-data:/app/server/data
      # 文件上传持久化
      - quiz-uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  quiz-data:
    driver: local
  quiz-uploads:
    driver: local
