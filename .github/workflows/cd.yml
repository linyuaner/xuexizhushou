# =============================================================================
# CD - 持续部署工作流
# 触发：推送到 main 分支 / 手动触发（workflow_dispatch）
# 职责：构建多架构 Docker 镜像 → 推送到 GHCR
# =============================================================================

name: CD

on:
  push:
    branches: [main]
    # 仅在以下路径变更时触发（避免文档修改也触发部署）
    paths:
      - 'src/**'
      - 'server/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'uno.config.ts'
      - 'index.html'
  # 手动触发
  workflow_dispatch:

# 全局变量（修改镜像名称请改这里）
env:
  # GitHub Container Registry 镜像名
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/study-helper
  # 强制使用 Node.js 24 运行 actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: 构建并推送 Docker 镜像到 GHCR
  # ─────────────────────────────────────────────────────
  build-and-push:
    name: 构建 & 推送镜像到 GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 提取 Git 元数据生成镜像标签
      # main 分支 → latest + 短 SHA；tag 推送 → 版本号
      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 设置 QEMU（多架构构建支持）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GitHub Container Registry
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送（同时支持 linux/amd64 + linux/arm64）
      - name: 构建并推送 Docker 镜像到 GHCR
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: 输出镜像摘要
        run: |
          echo "## 🐳 Docker 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像标签 | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像摘要 | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像地址 | \`${{ env.GHCR_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY

      - name: 通知构建结果
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ 镜像发布成功" >> $GITHUB_STEP_SUMMARY
            echo "- 镜像已发布到：\`${{ env.GHCR_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 镜像发布失败" >> $GITHUB_STEP_SUMMARY
            echo "请检查构建日志获取详细信息。" >> $GITHUB_STEP_SUMMARY
          fi
